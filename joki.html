<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joki - DannMarket Store</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<header class="navbar">
<h1 class="logo">DannMarket Store</h1>
</header>

<section class="container">
<h2>Jasa Joki</h2>
<div class="product-grid">
<div class="product">
<img src="images/akun1.jpg" alt="Joki 1">
<h3>Leveling 100 → 500</h3>
<p class="price">Rp100.000</p>
<button onclick="buy('Joki Leveling 100 → 500')">Beli Sekarang</button>
</div>

<div class="product">
<img src="images/akun2.jpg" alt="Joki 2">
<h3>Leveling 500 → 1000</h3>
<p class="price">Rp180.000</p>
<button onclick="buy('Joki Leveling 500 → 1000')">Beli Sekarang</button>
</div>

<div class="product">
<img src="images/akun3.jpg" alt="Joki 3">
<h3>Farm Mythic Fruit</h3>
<p class="price">Rp250.000</p>
<button onclick="buy('Joki Farm Mythic Fruit')">Beli Sekarang</button>
</div>
</div>
</section>

<section class="social-footer-pro">
<h2>Follow kami untuk update akun terbaru</h2>
<div class="social-icons">
<a href="https://www.instagram.com/username" target="_blank"><img src="images/instagram.png" alt="Instagram"></a>
<a href="https://www.tiktok.com/@username" target="_blank"><img src="images/tiktok.png" alt="TikTok"></a>
<a href="https://www.youtube.com/channel/CHANNEL_ID" target="_blank"><img src="images/youtube.png" alt="YouTube"></a>
</div>
<a href="https://www.instagram.com/username" target="_blank" class="follow-btn">Follow Sekarang</a>
<p>© 2026 DannMarket Store</p>
</section>

</body>
</html>
